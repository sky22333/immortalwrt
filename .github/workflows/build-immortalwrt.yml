name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号"
        required: true
        default: "25.12.0"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v7

      - name: 增加脚本执行权限
        run: chmod +x docker-run.sh

      - name: 运行 ImmortalWrt 构建脚本
        run: |
          echo "开始构建 ImmortalWrt，请耐心等待。"
          ./docker-run.sh
          echo "构建流程执行完成"

      - name: 打包所有固件
        run: |
          if [ ! -d "bin" ]; then
            echo "错误：未找到 bin 目录，请检查 docker-run.sh 是否正确输出"
            exit 1
          fi
          echo "压缩 bin 目录..."
          zip -r immortalwrt-bin.zip bin
          echo "压缩完成：immortalwrt-bin.zip"

      - name: 上传到 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: ImmortalWrt 固件包
          body: |
            ### 说明
            - 压缩包内包含所有格式的固件
            
          files: immortalwrt-bin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
